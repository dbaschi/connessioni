<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONNESSIONI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
</head>
<body background-color="grey">
    <div id="container">
        <div id="title">CONNESSIONI</div>
        <div id="top">
            <div id="grid" class="grid-container">
            </div>
            <div class="overlay-layer">
                <div id="one" class="Solution"></div>
                <div id="two" class="Solution"></div>
                <div id="three" class="Solution"></div>
                <div id="four" class="Solution"></div>
            </div>
        </div>
        <div id="mid">
            <div id="life-1" class="lifes"></div>
            <div id="life-2" class="lifes"></div>
            <div id="life-3" class="lifes"></div>
            <div id="life-4" class="lifes"></div>
        </div>
        <div id="bottom">
            <button id="shuffleBtn" class="commandBtn">SHUFFLE</button>
            <button id="submitBtn" class="commandBtn">SUBMIT</button>
        </div>
    </div>
    <script src = "main.js" type="module"></script>    
</body>
</html>
